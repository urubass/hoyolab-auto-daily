name: Daily check in

on:
  schedule:
    # 00:01 UTC+8: 18:01 Czech summer time, 17:01 Czech winter time.
    - cron: "1 16 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  check-in:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check Prague time
        id: prague-time
        shell: bash
        run: |
          echo "run=true" >> "$GITHUB_OUTPUT"

      - name: Clone Repo
        if: steps.prague-time.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.prague-time.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check In
        if: steps.prague-time.outputs.run == 'true'
        run: node index.js
        env:
          COOKIE: ${{ secrets.COOKIE }}
          GAMES: ${{ vars.GAMES }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          DISCORD_USER: ${{ secrets.DISCORD_USER }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@f72ff1a1336129f29bf0166c0fd0ca6cf1bcb38c # v1
